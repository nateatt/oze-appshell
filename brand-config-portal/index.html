<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Config Portal</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; background: #fafbfc; }
    h1 { font-size: 1.5rem; }
    fieldset { margin-bottom: 1.5rem; padding: 1rem; border: 1px solid #ccc; }
    legend { font-weight: bold; }
    label { display: block; margin-top: 0.5rem; }
    input, select { margin-top: 0.2rem; margin-bottom: 0.5rem; width: 100%; max-width: 300px; }
    .actions { margin-top: 2rem; }
    .gist-link { margin-top: 1rem; }
    .row { display: flex; gap: 1rem; }
    .row > div { flex: 1; }
  </style>
</head>
<body>
  <h1>Brand Config Portal</h1>
  <form id="brandForm">
    <fieldset>
      <legend>Brand Info</legend>
      <label>Brand Name <input name="brandName" value="Oze" required></label>
      <label>Version <input name="version" value="1.0.0" required></label>
    </fieldset>

    <fieldset>
      <legend>Colors</legend>
      <label>Primary <input name="primary" type="color" value="#1246EA"></label>
      <label>Secondary <input name="secondary" type="color" value="#161A5C"></label>
      <label>Tertiary <input name="tertiary" type="color" value="#F4D0EC"></label>
      <label>Error <input name="error" type="color" value="#C71313"></label>
      <label>Background <input name="background" type="color" value="#FFFFFF"></label>
      <label>Surface <input name="surface" type="color" value="#FFFFFF"></label>
      <label>Outline <input name="outline" type="color" value="#999999"></label>
      <label>Success <input name="success" type="color" value="#00B385"></label>
      <label>Warning <input name="warning" type="color" value="#FFC01F"></label>
      <label>Info <input name="info" type="color" value="#1246EA"></label>
      <label>Neutral <input name="neutral" type="color" value="#000000"></label>
      <label>Neutral Variant <input name="neutralVariant" type="color" value="#6267B7"></label>
      <fieldset>
        <legend>Dark Theme Overrides</legend>
        <label>Primary <input name="dark_primary" type="color" value="#416BEE"></label>
        <label>Secondary <input name="dark_secondary" type="color" value="#5C5F8D"></label>
        <label>Tertiary <input name="dark_tertiary" type="color" value="#BE59F0"></label>
        <label>Error <input name="dark_error" type="color" value="#D85A5A"></label>
        <label>Background <input name="dark_background" type="color" value="#1A1A1A"></label>
        <label>Surface <input name="dark_surface" type="color" value="#1A1A1A"></label>
        <label>Outline <input name="dark_outline" type="color" value="#4D4D4D"></label>
      </fieldset>
    </fieldset>

    <fieldset>
      <legend>Typography</legend>
      <label>Font Family <input name="fontFamily" value="DM Sans"></label>
      <label>Letter Spacing (%) <input name="letterSpacingPercent" type="number" step="0.01" value="-0.24"></label>
      <fieldset>
        <legend>Scale</legend>
        <div class="row">
          <div>
            <label>displayLarge Size <input name="displayLarge_size" type="number" value="32"></label>
            <label>displayLarge Line Height <input name="displayLarge_lineHeight" type="number" value="48"></label>
            <label>displayMedium Size <input name="displayMedium_size" type="number" value="28"></label>
            <label>displayMedium Line Height <input name="displayMedium_lineHeight" type="number" value="40"></label>
            <label>h1 Size <input name="h1_size" type="number" value="28"></label>
            <label>h1 Line Height <input name="h1_lineHeight" type="number" value="40"></label>
            <label>h2 Size <input name="h2_size" type="number" value="24"></label>
            <label>h2 Line Height <input name="h2_lineHeight" type="number" value="36"></label>
            <label>h3 Size <input name="h3_size" type="number" value="20"></label>
            <label>h3 Line Height <input name="h3_lineHeight" type="number" value="31"></label>
            <label>h4 Size <input name="h4_size" type="number" value="18"></label>
            <label>h4 Line Height <input name="h4_lineHeight" type="number" value="29"></label>
          </div>
          <div>
            <label>bodyLarge Size <input name="bodyLarge_size" type="number" value="16"></label>
            <label>bodyLarge Line Height <input name="bodyLarge_lineHeight" type="number" value="26"></label>
            <label>body Size <input name="body_size" type="number" value="14"></label>
            <label>body Line Height <input name="body_lineHeight" type="number" value="22"></label>
            <label>bodySmall Size <input name="bodySmall_size" type="number" value="12"></label>
            <label>bodySmall Line Height <input name="bodySmall_lineHeight" type="number" value="18"></label>
            <label>caption Size <input name="caption_size" type="number" value="10"></label>
            <label>caption Line Height <input name="caption_lineHeight" type="number" value="16"></label>
            <label>button Size <input name="button_size" type="number" value="14"></label>
            <label>button Line Height <input name="button_lineHeight" type="number" value="20"></label>
            <label>buttonLarge Size <input name="buttonLarge_size" type="number" value="16"></label>
            <label>buttonLarge Line Height <input name="buttonLarge_lineHeight" type="number" value="24"></label>
            <label>buttonSmall Size <input name="buttonSmall_size" type="number" value="12"></label>
            <label>buttonSmall Line Height <input name="buttonSmall_lineHeight" type="number" value="16"></label>
            <label>label Size <input name="label_size" type="number" value="12"></label>
            <label>label Line Height <input name="label_lineHeight" type="number" value="16"></label>
            <label>inputTitle Size <input name="inputTitle_size" type="number" value="12"></label>
            <label>inputTitle Line Height <input name="inputTitle_lineHeight" type="number" value="16"></label>
            <label>inputValue Size <input name="inputValue_size" type="number" value="14"></label>
            <label>inputValue Line Height <input name="inputValue_lineHeight" type="number" value="20"></label>
            <label>inputHelper Size <input name="inputHelper_size" type="number" value="12"></label>
            <label>inputHelper Line Height <input name="inputHelper_lineHeight" type="number" value="16"></label>
          </div>
        </div>
      </fieldset>
    </fieldset>

    <fieldset>
      <legend>Shapes</legend>
      <label>Extra Small <input name="extraSmall" type="number" value="4"></label>
      <label>Small <input name="small" type="number" value="8"></label>
      <label>Medium <input name="medium" type="number" value="12"></label>
      <label>Large <input name="large" type="number" value="16"></label>
      <label>Extra Large <input name="extraLarge" type="number" value="24"></label>
    </fieldset>

    <div class="actions">
      <button type="button" id="saveBtn">Save</button>
      <button type="button" id="resetBtn">Reset</button>
    </div>
    <div class="gist-link" id="gistLink"></div>
  </form>

  <script>
    // Default values for reset
    const defaultValues = {
      brandName: "Oze",
      version: "1.0.0",
      primary: "#1246EA",
      secondary: "#161A5C",
      tertiary: "#F4D0EC",
      error: "#C71313",
      background: "#FFFFFF",
      surface: "#FFFFFF",
      outline: "#999999",
      success: "#00B385",
      warning: "#FFC01F",
      info: "#1246EA",
      neutral: "#000000",
      neutralVariant: "#6267B7",
      dark_primary: "#416BEE",
      dark_secondary: "#5C5F8D",
      dark_tertiary: "#BE59F0",
      dark_error: "#D85A5A",
      dark_background: "#1A1A1A",
      dark_surface: "#1A1A1A",
      dark_outline: "#4D4D4D",
      fontFamily: "DM Sans",
      letterSpacingPercent: -0.24,
      displayLarge_size: 32, displayLarge_lineHeight: 48,
      displayMedium_size: 28, displayMedium_lineHeight: 40,
      h1_size: 28, h1_lineHeight: 40,
      h2_size: 24, h2_lineHeight: 36,
      h3_size: 20, h3_lineHeight: 31,
      h4_size: 18, h4_lineHeight: 29,
      bodyLarge_size: 16, bodyLarge_lineHeight: 26,
      body_size: 14, body_lineHeight: 22,
      bodySmall_size: 12, bodySmall_lineHeight: 18,
      caption_size: 10, caption_lineHeight: 16,
      button_size: 14, button_lineHeight: 20,
      buttonLarge_size: 16, buttonLarge_lineHeight: 24,
      buttonSmall_size: 12, buttonSmall_lineHeight: 16,
      label_size: 12, label_lineHeight: 16,
      inputTitle_size: 12, inputTitle_lineHeight: 16,
      inputValue_size: 14, inputValue_lineHeight: 20,
      inputHelper_size: 12, inputHelper_lineHeight: 16,
      extraSmall: 4, small: 8, medium: 12, large: 16, extraLarge: 24
    };

    function getFormData() {
      const f = document.forms.brandForm;
      return {
        _comment: "Client brand configuration.",
        brandName: f.brandName.value,
        version: f.version.value,
        colors: {
          _comment: "12 M3 seed roles. Values match OZE Figma design system (January 2026).",
          primary: f.primary.value,
          secondary: f.secondary.value,
          tertiary: f.tertiary.value,
          error: f.error.value,
          background: f.background.value,
          surface: f.surface.value,
          outline: f.outline.value,
          success: f.success.value,
          warning: f.warning.value,
          info: f.info.value,
          neutral: f.neutral.value,
          neutralVariant: f.neutralVariant.value,
          dark: {
            _comment: "Optional overrides for dark theme. Omit any field to auto-derive from the light seed.",
            primary: f.dark_primary.value,
            secondary: f.dark_secondary.value,
            tertiary: f.dark_tertiary.value,
            error: f.dark_error.value,
            background: f.dark_background.value,
            surface: f.dark_surface.value,
            outline: f.dark_outline.value
          }
        },
        typography: {
          _comment: "fontFamily must be a valid Google Fonts name or null to use the default Oze font. letterSpacingPercent is applied as: fontSize * (letterSpacingPercent / 100).",
          fontFamily: f.fontFamily.value,
          letterSpacingPercent: parseFloat(f.letterSpacingPercent.value),
          scale: {
            displayLarge:  { size: +f.displayLarge_size.value,  lineHeight: +f.displayLarge_lineHeight.value },
            displayMedium: { size: +f.displayMedium_size.value, lineHeight: +f.displayMedium_lineHeight.value },
            h1:            { size: +f.h1_size.value,            lineHeight: +f.h1_lineHeight.value },
            h2:            { size: +f.h2_size.value,            lineHeight: +f.h2_lineHeight.value },
            h3:            { size: +f.h3_size.value,            lineHeight: +f.h3_lineHeight.value },
            h4:            { size: +f.h4_size.value,            lineHeight: +f.h4_lineHeight.value },
            bodyLarge:     { size: +f.bodyLarge_size.value,     lineHeight: +f.bodyLarge_lineHeight.value },
            body:          { size: +f.body_size.value,          lineHeight: +f.body_lineHeight.value },
            bodySmall:     { size: +f.bodySmall_size.value,     lineHeight: +f.bodySmall_lineHeight.value },
            caption:       { size: +f.caption_size.value,       lineHeight: +f.caption_lineHeight.value },
            button:        { size: +f.button_size.value,        lineHeight: +f.button_lineHeight.value },
            buttonLarge:   { size: +f.buttonLarge_size.value,   lineHeight: +f.buttonLarge_lineHeight.value },
            buttonSmall:   { size: +f.buttonSmall_size.value,   lineHeight: +f.buttonSmall_lineHeight.value },
            label:         { size: +f.label_size.value,         lineHeight: +f.label_lineHeight.value },
            inputTitle:    { size: +f.inputTitle_size.value,    lineHeight: +f.inputTitle_lineHeight.value },
            inputValue:    { size: +f.inputValue_size.value,    lineHeight: +f.inputValue_lineHeight.value },
            inputHelper:   { size: +f.inputHelper_size.value,   lineHeight: +f.inputHelper_lineHeight.value }
          }
        },
        shapes: {
          _comment: "Corner radius values in dp. Applied to RoundedCornerShape.",
          extraSmall: +f.extraSmall.value,
          small: +f.small.value,
          medium: +f.medium.value,
          large: +f.large.value,
          extraLarge: +f.extraLarge.value
        }
      };
    }

    function setDefaults() {
      const f = document.forms.brandForm;
      for (const k in defaultValues) {
        if (f[k]) f[k].value = defaultValues[k];
      }
      document.getElementById('gistLink').innerHTML = '';
    }

    document.getElementById('resetBtn').onclick = setDefaults;

    document.getElementById('saveBtn').onclick = async function() {
      const json = JSON.stringify(getFormData(), null, 2);
      // Create Gist
      const res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          description: 'Oze Brand Config',
          public: true,
          files: { 'oze-brand-config.json': { content: json } }
        })
      });
      if (res.ok) {
        const data = await res.json();
        document.getElementById('gistLink').innerHTML =
          `<a href="${data.files['oze-brand-config.json'].raw_url}" target="_blank">Download JSON from Gist</a>`;
      } else {
        document.getElementById('gistLink').textContent = 'Failed to create Gist.';
      }
    };

    // Set defaults on load
    setDefaults();
  </script>
</body>
</html>
